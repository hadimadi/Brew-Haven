<!DOCTYPE html>
<html lang="en">
<head>
        <!-- Google font -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Gabriela&family=Share+Tech&display=swap" rel="stylesheet">
    <!-- font awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">

    <!-- bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- css -->
    <link rel="stylesheet" href="Style/style.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup</title>
</head>
<body>
        <div class="container-login-signup d-flex align-items-center justify-content-center">
        <div class="login-signup-box">
       
            <form>
                <h2>Sign Up</h2>
                    <input id="input-name" type="text" placeholder="Name">
                    <input id="input-email" type="email"  placeholder="Email">
                    <input id="input-pwd" type="password"   placeholder="Password">
                    <input id="input-cpwd" type="password"  placeholder="Confirm Password">
                <button type="button" class="submit-btn" id="submitBtn">
                    <span></span>
                    <span></span>
                    <span></span>
                   Sign Up
                </button>
                <div class="form-bottom">
                <p>Already have an account? <span><b><a href="login.html">Login</a></b></span></p>
                <a href="index.html"><i class="fa fa-home"></i></a>
               </div>
            
            </form>



<script src="JS/signup.js"></script>

<!-- jQuery library -->
<script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.slim.min.js"></script>

<!-- Popper JS -->
<script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>

<!-- Latest compiled JavaScript -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
