        <span></span>

        <span></span>
    </div>

   <div id="links-1" class="links1">

  <a href="signup.html"><button class="signup">Sign Up</button></a>
  </div>

  </div>
</div>

<section class="checkout-section">
        <div class="return-home">
       <button><a href="index.html"><i class="fa fa-arrow-left"></i> Return Home</a></button>
    </div>

<div class="checkout-container">
    <div class="checkout-left">
            <h2>Your Order</h2>
            <div class="checkout-items" id="checkoutItems"></div>
            <div class="checkout-total">
                <span>Total:</span> <span id="totalPrice"></span>
            </div>
    </div>

    <div class="checkout-right">
        <h2>Checkout Details</h2>
        <form id="checkout-form" class="checkout-form">
                <input type="text" id="name" name="name" required placeholder="Enter your name">
                <input type="email" id="email" name="email" required placeholder="Enter your email">
                <input type="text" id="address" name="address" required placeholder="Enter your address">
                <input type="text" id="phone" name="phone" required placeholder="Enter your phone number">
                <input type="text" id="city" name="city" required placeholder="Enter your city">
                <input type="text" id="state" name="state" required placeholder="Enter your state">
                <input type="text" id="zip" name="zip" required placeholder="Enter your zip code">
                <select  id="paymentMethod">
                    <option value="">Choose you prefered payment method</option>
                    <option value="cash">Cash on Delivery</option>
                    <option value="card" id="creditCard">Credit Card</option>
                    <div class="credit-card-box" id="creditCardBox"></div>
                </select>
            <button type="button" class="place-order-btn" id="placeOrder">Place Order</button>
        </form>
    </div>
</div>
</section>
